  - name: ORDERS_V
    synonyms:
      - Orders
      - transactions
      - sales
      - purchases
      - order_data
    base_table:
      database: TB_101
      schema: SEMANTIC_LAYER
      table: ORDERS_V
    dimensions:
      - name: COUNTRY
        synonyms:
          - nation
          - land
          - territory
          - state
          - region
          - area
          - locale
          - nationality
        description: 注文が行われた国。
        expr: COUNTRY
        data_type: VARCHAR(16777216)
        sample_values:
          - England
          - United States
          - India
      - name: CUSTOMER_ID
        synonyms:
          - client_id
          - customer_number
          - client_number
          - account_id
          - user_id
          - patron_id
          - buyer_id
        description: 注文を行った顧客の一意の識別子。
        expr: CUSTOMER_ID
        data_type: VARCHAR(134217728)
        sample_values:
          - '103412'
          - '104945'
          - '99502'
      - name: FRANCHISE_ID
        synonyms:
          - franchise_code
          - franchise_number
          - outlet_id
          - store_id
          - chain_id
          - affiliate_id
          - partner_id
        description: 注文が行われたフランチャイズの一意の識別子。
        expr: FRANCHISE_ID
        data_type: VARCHAR(134217728)
        sample_values:
          - '299'
          - '137'
          - '272'
      - name: GENDER
        synonyms:
          - sex
          - male_female
          - demographic
          - biological_sex
          - personal_gender
        description: 注文を行った顧客の性別。
        expr: GENDER
        data_type: VARCHAR(16777216)
        sample_values:
          - Male
          - Female
      - name: LOCATION_ID
        synonyms:
          - store_id
          - site_id
          - venue_id
          - outlet_id
          - branch_id
          - facility_id
          - premises_id
        description: 注文が行われた、または履行された場所の一意の識別子。
        expr: LOCATION_ID
        data_type: VARCHAR(134217728)
        sample_values:
          - '8158'
          - '5245'
          - '10868'
      - name: MARITAL_STATUS
        synonyms:
          - marital_state
          - relationship_status
          - civil_status
          - family_status
          - personal_status
        description: 注文を行った顧客の婚姻状況。
        expr: MARITAL_STATUS
        data_type: VARCHAR(16777216)
        sample_values:
          - Undisclosed
          - Married
      - name: MENU_ITEM_ID
        synonyms:
          - item_id
          - product_id
          - menu_code
          - item_code
          - product_code
          - dish_id
        description: 注文された特定のメニューアイテムの一意の識別子。
        expr: MENU_ITEM_ID
        data_type: VARCHAR(134217728)
        sample_values:
          - '81'
          - '42'
          - '114'
      - name: MENU_ITEM_NAME
        synonyms:
          - item_name
          - menu_item
          - product_name
          - dish_name
          - food_item
          - menu_description
        description: 顧客が注文したメニューアイテムの名前。
        expr: MENU_ITEM_NAME
        data_type: VARCHAR(16777216)
        sample_values:
          - Two Meat Plate
          - Tonkotsu Ramen
          - Lean Chicken Tikka Masala
      - name: MENU_TYPE
        synonyms:
          - menu_category
          - food_type
          - dish_type
          - cuisine
          - menu_classification
          - food_classification
        description: 注文されたメニューアイテムのタイプ（アイスクリーム、ラーメン、BBQ など）。
        expr: MENU_TYPE
        data_type: VARCHAR(16777216)
        sample_values:
          - Ice Cream
          - Ramen
          - BBQ
      - name: ORDER_DETAIL_ID
        synonyms:
          - order_line_id
          - order_item_id
          - order_component_id
          - detail_id
          - order_component_number
          - order_line_number
        description: 各注文詳細レコードの一意の識別子。注文内の個々のアイテムを区別するために使用されます。
        expr: ORDER_DETAIL_ID
        data_type: VARCHAR(134217728)
        sample_values:
          - '76011116'
          - '76016390'
          - '76025921'
      - name: ORDER_ID
        synonyms:
          - order_number
          - purchase_id
          - transaction_id
          - order_reference
          - invoice_number
          - purchase_order_number
        description: システムに登録された各注文の一意の識別子。
        expr: ORDER_ID
        data_type: VARCHAR(134217728)
        sample_values:
          - '46937872'
          - '46960867'
          - '97713514'
      - name: PRIMARY_CITY
        synonyms:
          - main_city
          - primary_town
          - city
          - hometown
          - main_town
          - hometown_name
          - primary_location
          - main_location
        description: 注文が主に履行された、または発生した都市。
        expr: PRIMARY_CITY
        data_type: VARCHAR(16777216)
        sample_values:
          - London
          - Rio de Janeiro
          - San Mateo
      - name: REGION
        synonyms:
          - area
          - territory
          - zone
          - district
          - province
          - state
          - county
          - locality
          - geographic_area
        description: 注文が行われた地理的地域。
        expr: REGION
        data_type: VARCHAR(16777216)
        sample_values:
          - Mazowieckie województwo
          - Western Cape
          - Bavaria
      - name: TRUCK_BRAND_NAME
        synonyms:
          - truck_maker
          - vehicle_brand
          - lorry_manufacturer
          - truck_model_name
          - vehicle_make
          - brand_name
        description: 注文を履行したトラックのブランド名。
        expr: TRUCK_BRAND_NAME
        data_type: VARCHAR(16777216)
        sample_values:
          - The Mega Melt
          - Le Coin des Crêpes
          - Guac n' Roll
      - name: TRUCK_ID
        synonyms:
          - vehicle_id
          - truck_number
          - vehicle_identifier
          - truck_identifier
          - lorry_id
          - transport_id
          - hauler_id
          - rig_id
        description: 注文を輸送したトラックの一意の識別子。
        expr: TRUCK_ID
        data_type: VARCHAR(134217728)
        sample_values:
          - '293'
          - '278'
          - '400'
    time_dimensions:
      - name: ORDER_DATE
        synonyms:
          - order_timestamp
          - order_creation_date
          - order_placement_date
          - order_submission_date
          - order_receipt_date
          - order_datetime
        description: 注文が行われた日付。
        expr: ORDER_DATE
        data_type: DATE
        sample_values:
          - '2021-12-20'
          - '2022-05-03'
          - '2022-03-13'
    facts:
      - name: FRANCHISE_FLAG
        synonyms:
          - franchise_status
          - franchise_indicator
          - is_franchise
          - franchise_designation
          - franchise_marker
        description: 注文がフランチャイズ店舗（1）か直営店舗（0）かを示すフラグ。
        expr: FRANCHISE_FLAG
        data_type: NUMBER(38,0)
        access_modifier: public_access
        sample_values:
          - '0'
          - '1'
      - name: ORDER_TOTAL
        synonyms:
          - order_amount
          - total_cost
          - total_order_value
          - order_value
          - total_price
          - order_price
          - total_amount_due
          - order_cost
        description: 全アイテムおよび適用される税金や割引を含む注文の合計金額。
        expr: ORDER_TOTAL
        data_type: NUMBER(38,4)
        access_modifier: public_access
        sample_values:
          - '708.0000'
          - '638.5000'
          - '657.2500'
      - name: QUANTITY
        synonyms:
          - amount
          - count
          - number
          - volume
          - total
          - units
          - items
          - stock
          - inventory
          - supply
        description: 注文されたアイテムの数量。
        expr: QUANTITY
        data_type: NUMBER(5,0)
        access_modifier: public_access
        sample_values:
          - '1'
          - '7'
          - '19'
relationships:
  - name: ORDERS_TO_CUSTOMER_LOYALTY_METRICS
    left_table: ORDERS_V
    right_table: CUSTOMER_LOYALTY_METRICS_V
    relationship_columns:
      - left_column: CUSTOMER_ID
        right_column: CUSTOMER_ID
