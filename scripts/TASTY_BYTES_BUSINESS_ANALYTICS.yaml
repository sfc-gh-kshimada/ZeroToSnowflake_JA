      - Customers
      - customer_data
      - loyalty
      - customer_metrics
      - customer_info
    base_table:
      database: TB_101
      schema: SEMANTIC_LAYER
      table: CUSTOMER_LOYALTY_METRICS_V
    dimensions:
      - name: CITY
        synonyms:
          - town
          - municipality
          - metropolis
          - urban_area
          - location
          - geographical_area
          - settlement
          - urban_center
        description: 顧客が所在する都市。
        expr: CITY
        data_type: VARCHAR(16777216)
        sample_values:
          - Vancouver
          - New York City
          - Berlin
      - name: COUNTRY
        synonyms:
          - nation
          - land
          - territory
          - state
          - region
          - area
          - locale
          - homeland
        description: 顧客が所在する国。
        expr: COUNTRY
        data_type: VARCHAR(16777216)
        sample_values:
