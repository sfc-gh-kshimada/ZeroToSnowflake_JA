name: TASTY_BYTES_BUSINESS_ANALYTICS
description: |
  Tasty Bytes のエグゼクティブ分析向けセマンティックモデル。自然言語クエリのために、顧客ロイヤルティと注文パフォーマンスのデータをカバーしています。
